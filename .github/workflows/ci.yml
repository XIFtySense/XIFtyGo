name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtyGo
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/XIFtyGo/.xifty-core/target/debug
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtyGo

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFtyGo/.xifty-core -> target

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Prepare core
        run: bash scripts/prepare-core.sh

      - name: Run tests
        run: go test ./...

      - name: Run examples
        run: |
          go run ./examples/basic_usage
          go run ./examples/gallery_ingest
